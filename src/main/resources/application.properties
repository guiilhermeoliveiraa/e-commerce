spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rsa.private-key=classpath:security/private.pem
spring.rsa.public-key=classpath:security/public.pem

spring.sendgrid.api-key=${SENDGRID_API_KEY}
spring.sendgrid.from-email=${SENDGRID_FROM_EMAIL}
spring.sendgrid.template-id=${SENDGRID_TEMPLATE_ID}